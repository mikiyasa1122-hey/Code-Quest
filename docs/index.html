<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Code Quest Demo</title>
    <meta
      name="description"
      content="DBなしで遊べるCode QuestのGitHub Pages版です。進捗はブラウザに保存されます。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#/">
        <span class="brand-mark" aria-hidden="true">CQ</span>
        <span>
          <strong>Code Quest</strong>
          <small>GitHub Pages Demo</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="メインメニュー">
        <a href="#/">Home</a>
        <a href="#/quests">Quests</a>
        <a href="#/history">History</a>
        <a href="#/badges">Badges</a>
      </nav>
    </header>

    <main id="app" class="app-shell" tabindex="-1"></main>

    <template id="quest-result-template">
      <section class="result-panel" aria-live="polite"></section>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
